# fly.toml app configuration file generated for apuntado-vps-floral-resonance-3688 on 2026-05-30T08:52:26Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'apuntado-vps-floral-resonance-3688'
primary_region = 'dfw'

[build]

[deploy]
  strategy = 'immediate'

[env]
  AUTH_SESSIONS_DIR = '/data/auth_sessions'
  NODE_ENV = 'production'
  TZ = 'America/Tegucigalpa'

[[mounts]]
  source = 'auth_sessions'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 500
    soft_limit = 400

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

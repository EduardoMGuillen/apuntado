# Apuntado VPS — WhatsApp (Baileys) + Socket.io
# Deploy: fly deploy (desde vps/)
# Docs: https://fly.io/docs

app = "apuntado-vps"
primary_region = "dfw"

[build]

[env]
  TZ = "America/Tegucigalpa"
  AUTH_SESSIONS_DIR = "/data/auth_sessions"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

[[http_service.checks]]
  grace_period = "20s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

# Sesiones WhatsApp — deben persistir entre reinicios
[mounts]
  source = "auth_sessions"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Una sola máquina: WhatsApp no soporta réplicas horizontales
[deploy]
  strategy = "immediate"
